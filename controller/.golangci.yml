version: 2
run:
  deadline: 5m
  allow-parallel-runners: true
  issues-exit-code: 0

issues:
  exclude-use-default: false
  exclude-rules:
    - path: "api/*"
      linters:
        - lll
    - path: "internal/*"
      linters:
        - dupl
        - lll
    - path: "internal/server/*"
      linters:
        - dupl
        - lll
    - path: "_test\\.go$"
      linters:
        - dupl
        - errcheck
        - goconst
        - gocyclo
        - revive
        - lll
        - nakedret
        - staticcheck
        - unused
        - govet
        - misspell
        - prealloc
        - unparam
        - unconvert
    - path: "test/*"
      linters:
        - nakedret

linters:
  disable-all: true
  enable:
    - dupl
    - errcheck
    - goconst
    - gocyclo
    - revive
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - unused

settings:
  lll:
    line-length: 120
  gocyclo:
    min-complexity: 15
  misspell:
    locale: US
